<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <head th:replace="~{layout/base :: head}"></head>
    <title>Add Tutor | Admin</title>
</head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>
<div th:replace="~{layout/base :: flashMessages}"></div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-person-badge me-2"></i>Add New Tutor</h5>
                    <small class="text-muted">Admin-created tutors are automatically approved.</small>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/tutors/new}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="section-divider"><span>Account Details</span></div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Full Name *</label>
                                <input type="text" name="fullName" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email *</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input type="tel" name="phone" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Password *</label>
                                <input type="password" name="password" class="form-control"
                                       minlength="6" required>
                            </div>
                        </div>

                        <div class="section-divider"><span>Tutor Profile</span></div>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Subjects *</label>
                                <input type="text" name="subjects" class="form-control"
                                       placeholder="e.g. Mathematics, Physics" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Hourly Rate (LKR) *</label>
                                <input type="number" name="hourlyRate" class="form-control"
                                       min="0" step="50" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Experience (years)</label>
                                <input type="number" name="experienceYears" class="form-control" min="0">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Qualification</label>
                                <input type="text" name="qualification" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Location</label>
                                <input type="text" name="location" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Availability</label>
                                <input type="text" name="availability" class="form-control"
                                       placeholder="e.g. Mon-Fri 4pm-8pm">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Bio</label>
                                <textarea name="bio" rows="3" class="form-control"></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-person-check me-2"></i>Add & Approve Tutor
                            </button>
                            <a th:href="@{/admin/tutors}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
