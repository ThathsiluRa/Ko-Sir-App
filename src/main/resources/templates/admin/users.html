<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <head th:replace="~{layout/base :: head}"></head>
    <title>Manage Users | Admin</title>
</head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>
<div th:replace="~{layout/base :: flashMessages}"></div>

<div class="container py-4">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1><i class="bi bi-people me-2"></i>Manage Users</h1>
            <p>View, edit, activate/deactivate all platform users.</p>
        </div>
        <a th:href="@{/admin/users/new}" class="btn btn-accent">
            <i class="bi bi-person-plus me-2"></i>Add User
        </a>
    </div>

    <!-- Role Filter Tabs -->
    <div class="filter-tabs mb-4">
        <a th:href="@{/admin/users}" class="filter-tab"
           th:classappend="${filterRole == null} ? 'active' : ''">All Users</a>
        <a th:href="@{/admin/users(role='STUDENT')}" class="filter-tab"
           th:classappend="${filterRole?.name() == 'STUDENT'} ? 'active' : ''">Students</a>
        <a th:href="@{/admin/users(role='TUTOR')}" class="filter-tab"
           th:classappend="${filterRole?.name() == 'TUTOR'} ? 'active' : ''">Tutors</a>
        <a th:href="@{/admin/users(role='ADMIN')}" class="filter-tab"
           th:classappend="${filterRole?.name() == 'ADMIN'} ? 'active' : ''">Admins</a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover admin-table mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="mini-avatar mini-avatar-sm">
                                        <span th:text="${user.fullName.substring(0,1).toUpperCase()}">U</span>
                                    </div>
                                    <span th:text="${user.fullName}">Name</span>
                                </div>
                            </td>
                            <td th:text="${user.email}">Email</td>
                            <td th:text="${user.phone ?: '-'}">Phone</td>
                            <td>
                                <span th:text="${user.role}"
                                      class="role-badge"
                                      th:classappend="${user.role.name() == 'ADMIN'} ? '' :
                                                      (${user.role.name() == 'TUTOR'} ? 'role-tutor' : 'role-student')">
                                    ROLE
                                </span>
                            </td>
                            <td>
                                <span th:if="${user.active}" class="badge bg-success">Active</span>
                                <span th:if="${!user.active}" class="badge bg-danger">Inactive</span>
                            </td>
                            <td th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">Date</td>
                            <td>
                                <div class="d-flex gap-1 flex-wrap">
                                    <!-- Edit button -->
                                    <a th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <!-- Toggle Active/Inactive -->
                                    <form th:action="@{/admin/users/{id}/toggle-status(id=${user.id})}"
                                          method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}">
                                        <button type="submit"
                                                th:class="${user.active} ? 'btn btn-sm btn-outline-warning' : 'btn btn-sm btn-outline-success'"
                                                th:title="${user.active} ? 'Deactivate' : 'Activate'">
                                            <i th:class="${user.active} ? 'bi bi-pause' : 'bi bi-play'"></i>
                                        </button>
                                    </form>
                                    <!-- Delete button -->
                                    <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                                          method="post"
                                          onsubmit="return confirm('Are you sure you want to delete this user? This cannot be undone.')">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(users)}" class="empty-state">
                <i class="bi bi-people"></i>
                <h5>No users found</h5>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
