<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <head th:replace="~{layout/base :: head}"></head>
    <title>Leave a Review | Ko-Sir AI</title>
</head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>

<div class="container py-5 d-flex justify-content-center">
    <div class="review-form-card">
        <div class="review-form-header">
            <i class="bi bi-star-fill text-warning fs-1"></i>
            <h3>Leave a Review</h3>
            <p>How was your session with
                <strong th:text="${booking.tutorProfile.user.fullName}">Tutor</strong>?
            </p>
        </div>

        <!-- Session summary -->
        <div class="session-summary mb-4">
            <div class="session-summary-item">
                <i class="bi bi-book"></i>
                <span th:text="${booking.subject}">Subject</span>
            </div>
            <div class="session-summary-item">
                <i class="bi bi-calendar3"></i>
                <span th:text="${#temporals.format(booking.bookingDate, 'dd MMM yyyy')}">Date</span>
            </div>
        </div>

        <form th:action="@{/student/bookings/{id}/review(id=${booking.id})}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- Star Rating (interactive) -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Your Rating *</label>
                <div class="star-rating-input">
                    <!-- 5 star inputs - CSS makes them interactive -->
                    <input type="radio" name="rating" value="5" id="star5" required>
                    <label for="star5"><i class="bi bi-star-fill"></i></label>
                    <input type="radio" name="rating" value="4" id="star4">
                    <label for="star4"><i class="bi bi-star-fill"></i></label>
                    <input type="radio" name="rating" value="3" id="star3">
                    <label for="star3"><i class="bi bi-star-fill"></i></label>
                    <input type="radio" name="rating" value="2" id="star2">
                    <label for="star2"><i class="bi bi-star-fill"></i></label>
                    <input type="radio" name="rating" value="1" id="star1">
                    <label for="star1"><i class="bi bi-star-fill"></i></label>
                </div>
                <div class="rating-labels d-flex justify-content-between mt-1">
                    <small>Poor</small>
                    <small>Excellent</small>
                </div>
            </div>

            <!-- Written Review -->
            <div class="mb-4">
                <label for="comment" class="form-label fw-semibold">
                    Your Review <small class="text-muted">(optional)</small>
                </label>
                <textarea id="comment" name="comment" rows="4" class="form-control"
                          placeholder="Tell other students about your experience..."></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-accent btn-lg flex-fill">
                    <i class="bi bi-send me-2"></i>Submit Review
                </button>
                <a th:href="@{/student/bookings}" class="btn btn-outline-secondary btn-lg">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
