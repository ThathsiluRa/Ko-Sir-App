<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <head th:replace="~{layout/base :: head}"></head>
    <title th:text="${tutor.user.fullName + ' | Ko-Sir AI'}">Tutor Profile</title>
</head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>

<div class="container py-4">
    <a th:href="@{/student/search}" class="btn btn-outline-secondary btn-sm mb-3">
        <i class="bi bi-arrow-left me-1"></i>Back to Search
    </a>

    <div class="row g-4">
        <!-- Profile Sidebar -->
        <div class="col-lg-4">
            <div class="card profile-sidebar">
                <div class="profile-sidebar-header">
                    <div class="tutor-avatar-xl">
                        <span th:text="${tutor.user.fullName.substring(0,1).toUpperCase()}">T</span>
                    </div>
                    <h3 th:text="${tutor.user.fullName}">Tutor Name</h3>
                    <div class="rating-display">
                        <i class="bi bi-star-fill text-warning"></i>
                        <strong th:text="${tutor.averageRating}">0.0</strong>
                        <span th:text="'(' + ${tutor.totalReviews} + ' reviews)'">
                            (0 reviews)
                        </span>
                    </div>
                </div>
                <div class="profile-sidebar-body">
                    <div class="profile-info-item">
                        <i class="bi bi-book"></i>
                        <div>
                            <small>Subjects</small>
                            <strong th:text="${tutor.subjects}">Subjects</strong>
                        </div>
                    </div>
                    <div class="profile-info-item">
                        <i class="bi bi-geo-alt"></i>
                        <div>
                            <small>Location</small>
                            <strong th:text="${tutor.location}">Location</strong>
                        </div>
                    </div>
                    <div class="profile-info-item" th:if="${tutor.qualification != null}">
                        <i class="bi bi-award"></i>
                        <div>
                            <small>Qualification</small>
                            <strong th:text="${tutor.qualification}">Qualification</strong>
                        </div>
                    </div>
                    <div class="profile-info-item" th:if="${tutor.experienceYears != null}">
                        <i class="bi bi-briefcase"></i>
                        <div>
                            <small>Experience</small>
                            <strong th:text="${tutor.experienceYears + ' years'}">0 years</strong>
                        </div>
                    </div>
                    <div class="profile-info-item" th:if="${tutor.availability != null}">
                        <i class="bi bi-clock"></i>
                        <div>
                            <small>Availability</small>
                            <strong th:text="${tutor.availability}">Availability</strong>
                        </div>
                    </div>
                    <div class="profile-rate-box mt-3">
                        <span class="rate-label">Hourly Rate</span>
                        <span class="rate-big">LKR <span th:text="${tutor.hourlyRate}">0</span></span>
                    </div>
                    <a th:href="@{/booking/new(tutorId=${tutor.id})}"
                       class="btn btn-accent w-100 mt-3 btn-lg">
                        <i class="bi bi-calendar-plus me-2"></i>Book a Session
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-lg-8">
            <!-- Bio -->
            <div class="card mb-4" th:if="${tutor.bio != null}">
                <div class="card-header"><h5>About</h5></div>
                <div class="card-body">
                    <p th:text="${tutor.bio}">Bio</p>
                </div>
            </div>

            <!-- Reviews Section -->
            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-star me-2"></i>Student Reviews
                        <span class="badge bg-warning text-dark ms-2"
                              th:text="${#lists.size(reviews)}">0</span>
                    </h5>
                </div>
                <div class="card-body">
                    <div th:if="${not #lists.isEmpty(reviews)}">
                        <div class="review-item" th:each="review : ${reviews}">
                            <div class="review-header">
                                <div class="review-author">
                                    <div class="mini-avatar">
                                        <span th:text="${review.student.fullName.substring(0,1).toUpperCase()}">S</span>
                                    </div>
                                    <div>
                                        <strong th:text="${review.student.fullName}">Student</strong>
                                        <small th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy')}">Date</small>
                                    </div>
                                </div>
                                <!-- Star rating display -->
                                <div class="review-stars">
                                    <span th:each="i : ${#numbers.sequence(1, review.rating)}">
                                        <i class="bi bi-star-fill text-warning"></i>
                                    </span>
                                    <span th:each="i : ${#numbers.sequence(review.rating + 1, 5)}"
                                          th:if="${review.rating < 5}">
                                        <i class="bi bi-star text-muted"></i>
                                    </span>
                                </div>
                            </div>
                            <p class="review-comment" th:text="${review.comment}">Comment</p>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-4">
                        <i class="bi bi-chat-quote fs-1 text-muted"></i>
                        <p class="text-muted mt-2">No reviews yet. Be the first to review!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
