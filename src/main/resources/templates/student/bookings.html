<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <head th:replace="~{layout/base :: head}"></head>
    <title>My Bookings | Ko-Sir AI</title>
</head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>
<div th:replace="~{layout/base :: flashMessages}"></div>

<div class="container py-4">
    <div class="page-header mb-4">
        <h1><i class="bi bi-calendar3 me-2"></i>My Bookings</h1>
    </div>

    <!-- Status Filter Tabs -->
    <div class="filter-tabs mb-4">
        <a th:href="@{/student/bookings}"
           class="filter-tab" th:classappend="${filterStatus == null} ? 'active' : ''">
            All
        </a>
        <!-- th:each over all BookingStatus enum values -->
        <a th:each="status : ${statuses}"
           th:href="@{/student/bookings(status=${status.name()})}"
           th:text="${status}"
           class="filter-tab"
           th:classappend="${filterStatus == status} ? 'active' : ''">
            STATUS
        </a>
    </div>

    <!-- Bookings List -->
    <div th:if="${not #lists.isEmpty(bookings)}">
        <div class="booking-list">
            <div class="booking-item" th:each="booking : ${bookings}">

                <!-- Booking Header -->
                <div class="booking-item-header">
                    <div class="booking-tutor-info">
                        <div class="mini-avatar">
                            <span th:text="${booking.tutorProfile.user.fullName.substring(0,1).toUpperCase()}">T</span>
                        </div>
                        <div>
                            <strong th:text="${booking.tutorProfile.user.fullName}">Tutor</strong>
                            <span class="booking-subject ms-2"
                                  th:text="${booking.subject}">Subject</span>
                        </div>
                    </div>
                    <span class="status-badge"
                          th:classappend="${booking.status.name() == 'PENDING'} ? 'status-pending' :
                                          (${booking.status.name() == 'CONFIRMED'} ? 'status-confirmed' :
                                          (${booking.status.name() == 'COMPLETED'} ? 'status-completed' :
                                          (${booking.status.name() == 'REJECTED'} ? 'status-rejected' : 'status-cancelled')))"
                          th:text="${booking.status}">
                        STATUS
                    </span>
                </div>

                <!-- Booking Details -->
                <div class="booking-details">
                    <div class="booking-detail-item">
                        <i class="bi bi-calendar3"></i>
                        <span th:text="${#temporals.format(booking.bookingDate, 'EEEE, dd MMMM yyyy')}">Date</span>
                    </div>
                    <div class="booking-detail-item">
                        <i class="bi bi-clock"></i>
                        <span th:text="${#temporals.format(booking.startTime, 'hh:mm a') + ' (' + booking.durationHours + ' hr)'}">Time</span>
                    </div>
                    <div class="booking-detail-item">
                        <i class="bi bi-cash-coin"></i>
                        <span th:text="'LKR ' + ${booking.totalPrice}">Price</span>
                    </div>
                    <div class="booking-detail-item" th:if="${booking.sessionLocation != null}">
                        <i class="bi bi-geo-alt-fill" style="color:var(--gold);"></i>
                        <span th:text="${booking.sessionLocation}">Location</span>
                    </div>
                    <div class="booking-detail-item" th:if="${booking.notes != null}">
                        <i class="bi bi-chat-dots"></i>
                        <span th:text="${booking.notes}">Notes</span>
                    </div>
                </div>

                <!-- Status Note (reason for cancellation/rejection) -->
                <div th:if="${booking.statusNote != null}" class="booking-status-note">
                    <i class="bi bi-info-circle me-1"></i>
                    <span th:text="${booking.statusNote}">Reason</span>
                </div>

                <!-- Action Buttons -->
                <div class="booking-actions">

                    <!-- Chat button — available once payment is done -->
                    <a th:if="${booking.status.name() != 'PENDING_PAYMENT' and booking.status.name() != 'CANCELLED' and booking.status.name() != 'REJECTED'}"
                       th:href="@{'/booking/' + ${booking.id} + '/chat'}"
                       class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-chat-dots me-1"></i>Message Tutor
                    </a>

                    <!-- Leave Review button (only for completed, unreviewed bookings) -->
                    <a th:if="${booking.canLeaveReview()}"
                       th:href="@{/student/bookings/{id}/review(id=${booking.id})}"
                       class="btn btn-warning btn-sm">
                        <i class="bi bi-star me-1"></i>Leave Review
                    </a>

                    <!-- Reviewed badge -->
                    <span th:if="${booking.status.name() == 'COMPLETED' and !booking.canLeaveReview()}"
                          class="badge bg-success fs-6">
                        <i class="bi bi-patch-check me-1"></i>Reviewed
                    </span>

                    <!-- Cancel button (only for PENDING bookings) -->
                    <form th:if="${booking.status.name() == 'PENDING'}"
                          th:action="@{/booking/{id}/cancel(id=${booking.id})}"
                          method="post"
                          onsubmit="return confirm('Cancel this booking?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="reason" value="Cancelled by student">
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-x-circle me-1"></i>Cancel
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(bookings)}" class="empty-state">
        <i class="bi bi-calendar-x"></i>
        <h5>No bookings found</h5>
        <p>You haven't made any bookings yet. Find a tutor to get started!</p>
        <a th:href="@{/student/search}" class="btn btn-accent">Find a Tutor</a>
    </div>

</div>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
