<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <head th:replace="~{layout/base :: head}"></head>
    <title>My Sessions | Ko-Sir AI</title>
</head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>
<div th:replace="~{layout/base :: flashMessages}"></div>

<div class="container py-4">
    <div class="page-header mb-4">
        <h1><i class="bi bi-calendar3 me-2"></i>My Sessions</h1>
    </div>

    <!-- Status Filter Tabs -->
    <div class="filter-tabs mb-4">
        <a th:href="@{/tutor/bookings}" class="filter-tab"
           th:classappend="${filterStatus == null} ? 'active' : ''">All</a>
        <a th:each="status : ${statuses}"
           th:href="@{/tutor/bookings(status=${status.name()})}"
           th:text="${status}" class="filter-tab"
           th:classappend="${filterStatus == status} ? 'active' : ''">STATUS</a>
    </div>

    <div th:if="${not #lists.isEmpty(bookings)}">
        <div class="booking-list">
            <div class="booking-item" th:each="booking : ${bookings}">
                <div class="booking-item-header">
                    <div class="booking-tutor-info">
                        <div class="mini-avatar">
                            <span th:text="${booking.studentProfile.user.fullName.substring(0,1).toUpperCase()}">S</span>
                        </div>
                        <div>
                            <strong th:text="${booking.studentProfile.user.fullName}">Student</strong>
                            <span class="ms-2 badge bg-light text-dark"
                                  th:text="${booking.subject}">Subject</span>
                        </div>
                    </div>
                    <span class="status-badge"
                          th:classappend="${booking.status.name() == 'PENDING'} ? 'status-pending' :
                                          (${booking.status.name() == 'CONFIRMED'} ? 'status-confirmed' :
                                          (${booking.status.name() == 'COMPLETED'} ? 'status-completed' : 'status-cancelled'))"
                          th:text="${booking.status}">STATUS</span>
                </div>
                <div class="booking-details">
                    <div class="booking-detail-item">
                        <i class="bi bi-calendar3"></i>
                        <span th:text="${#temporals.format(booking.bookingDate, 'EEE, dd MMM yyyy')}">Date</span>
                    </div>
                    <div class="booking-detail-item">
                        <i class="bi bi-clock"></i>
                        <span th:text="${booking.durationHours + ' hour(s) at ' + #temporals.format(booking.startTime, 'HH:mm')}">Time</span>
                    </div>
                    <div class="booking-detail-item">
                        <i class="bi bi-cash-coin"></i>
                        <span th:text="'LKR ' + ${booking.totalPrice}">Price</span>
                    </div>
                    <div class="booking-detail-item" th:if="${booking.studentProfile.grade != null}">
                        <i class="bi bi-mortarboard"></i>
                        <span th:text="${booking.studentProfile.grade + ' - ' + (booking.studentProfile.school ?: '')}">Grade</span>
                    </div>
                </div>
                <div th:if="${booking.sessionLocation != null}" class="booking-status-note"
                     style="background:rgba(244,161,10,0.08);border-left:3px solid var(--gold);padding:0.5rem 0.75rem;border-radius:0 8px 8px 0;margin-bottom:0.5rem;">
                    <i class="bi bi-geo-alt-fill me-1" style="color:var(--gold);"></i>
                    <strong style="font-size:0.8rem;">Session at:</strong>
                    <span th:text="${booking.sessionLocation}">Address</span>
                </div>
                <div th:if="${booking.notes != null}" class="booking-status-note">
                    <i class="bi bi-chat-dots me-1"></i><em th:text="${booking.notes}">Notes</em>
                </div>
                <!-- Actions -->
                <div class="booking-actions d-flex gap-2 flex-wrap">
                    <!-- PENDING: confirm or reject -->
                    <form th:if="${booking.status.name() == 'PENDING'}"
                          th:action="@{/tutor/bookings/{id}/confirm(id=${booking.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-success btn-sm">
                            <i class="bi bi-check-lg me-1"></i>Confirm
                        </button>
                    </form>
                    <form th:if="${booking.status.name() == 'PENDING'}"
                          th:action="@{/tutor/bookings/{id}/reject(id=${booking.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-x-lg me-1"></i>Decline
                        </button>
                    </form>
                    <!-- CONFIRMED: mark as complete -->
                    <form th:if="${booking.status.name() == 'CONFIRMED'}"
                          th:action="@{/tutor/bookings/{id}/complete(id=${booking.id})}" method="post"
                          onsubmit="return confirm('Mark this session as completed?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-primary btn-sm">
                            <i class="bi bi-check-circle me-1"></i>Mark Completed
                        </button>
                    </form>
                    <!-- COMPLETED badge -->
                    <span th:if="${booking.status.name() == 'COMPLETED'}" class="badge bg-success fs-6">
                        <i class="bi bi-patch-check me-1"></i>Session Complete
                    </span>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(bookings)}" class="empty-state">
        <i class="bi bi-calendar-x"></i>
        <h5>No sessions found</h5>
        <p>No bookings match the selected filter.</p>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
