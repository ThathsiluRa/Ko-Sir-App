# =====================================================
# APPLICATION PROPERTIES
# This file configures the entire Spring Boot app.
# All settings Spring needs to run are defined here.
# =====================================================

# App name (shows in logs)
spring.application.name=tutor-booking-platform

# =====================================================
# SERVER CONFIGURATION
# The port the app runs on. Visit: http://localhost:8080
# =====================================================
server.port=8080

# =====================================================
# H2 IN-MEMORY DATABASE CONFIGURATION
# H2 is an embedded database - no external DB needed.
# The database lives in memory and resets on each restart.
# =====================================================

# JDBC URL - "tutordb" is the database name
spring.datasource.url=jdbc:h2:mem:tutordb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# H2 driver class
spring.datasource.driverClassName=org.h2.Driver

# Default H2 credentials
spring.datasource.username=sa
spring.datasource.password=

# =====================================================
# H2 CONSOLE (WEB DATABASE BROWSER)
# Visit http://localhost:8080/h2-console to browse the DB.
# Use this to see your tables and run SQL queries.
# =====================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =====================================================
# JPA / HIBERNATE SETTINGS
# Controls how Spring maps Java objects to DB tables.
# =====================================================

# create-drop = Create tables on startup, drop on shutdown
# Other options: update (keep data), validate (check only)
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true

# Pretty-print the SQL output
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate to use H2 dialect (optimized SQL for H2)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# =====================================================
# THYMELEAF SETTINGS
# Controls how HTML templates are loaded and cached.
# =====================================================

# Disable caching during development (see changes instantly)
spring.thymeleaf.cache=false

# Template file encoding
spring.thymeleaf.encoding=UTF-8

# =====================================================
# MULTIPART FILE UPLOAD (for profile pictures, future use)
# =====================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# =====================================================
# LOGGING
# Set log levels to see what's happening in the app.
# DEBUG shows very detailed info; INFO shows key events.
# =====================================================
logging.level.com.tutorplatform=DEBUG
logging.level.org.springframework.security=INFO
