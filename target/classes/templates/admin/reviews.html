<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <head th:replace="~{layout/base :: head}"></head>
    <title>Manage Reviews | Admin</title>
</head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>
<div th:replace="~{layout/base :: flashMessages}"></div>

<div class="container py-4">
    <div class="page-header mb-4">
        <h1><i class="bi bi-star me-2"></i>Manage Reviews</h1>
        <p>Total reviews: <strong th:text="${totalReviews}">0</strong></p>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover admin-table mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Student</th>
                            <th>Tutor</th>
                            <th>Rating</th>
                            <th>Comment</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="review : ${reviews}">
                            <td th:text="${review.id}">1</td>
                            <td th:text="${review.student.fullName}">Student</td>
                            <td th:text="${review.tutorProfile.user.fullName}">Tutor</td>
                            <td>
                                <span th:each="i : ${#numbers.sequence(1, review.rating)}">
                                    <i class="bi bi-star-fill text-warning"></i>
                                </span>
                                <strong th:text="${review.rating}">0</strong>
                            </td>
                            <td>
                                <span th:if="${review.comment != null}"
                                      th:text="${review.comment.length() > 60 ? review.comment.substring(0,60) + '...' : review.comment}">
                                    Comment
                                </span>
                                <em th:if="${review.comment == null}" class="text-muted">No comment</em>
                            </td>
                            <td th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy')}">Date</td>
                            <td>
                                <form th:action="@{/admin/reviews/{id}/delete(id=${review.id})}"
                                      method="post"
                                      onsubmit="return confirm('Delete this review? This will also recalculate the tutor\'s rating.')">
                                    <input type="hidden" th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(reviews)}" class="empty-state">
                <i class="bi bi-star"></i>
                <h5>No reviews yet</h5>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
