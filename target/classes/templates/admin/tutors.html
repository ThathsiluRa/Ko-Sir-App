<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <head th:replace="~{layout/base :: head}"></head>
    <title>Manage Tutors | Admin</title>
</head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>
<div th:replace="~{layout/base :: flashMessages}"></div>

<div class="container py-4">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1><i class="bi bi-person-badge me-2"></i>Manage Tutors</h1>
            <p>
                Approve new tutors, manage profiles.
                <span th:if="${pendingCount > 0}" class="badge bg-danger ms-2">
                    <span th:text="${pendingCount}">0</span> awaiting approval
                </span>
            </p>
        </div>
        <a th:href="@{/admin/tutors/new}" class="btn btn-success">
            <i class="bi bi-person-plus me-2"></i>Add Tutor
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover admin-table mb-0">
                    <thead>
                        <tr>
                            <th>Tutor</th>
                            <th>Subjects</th>
                            <th>Location</th>
                            <th>Rate (KES/hr)</th>
                            <th>Rating</th>
                            <th>Status</th>
                            <th>Bookings</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tutor : ${tutors}"
                            th:classappend="${!tutor.approved} ? 'table-warning' : ''">
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="mini-avatar mini-avatar-sm">
                                        <span th:text="${tutor.user.fullName.substring(0,1).toUpperCase()}">T</span>
                                    </div>
                                    <div>
                                        <div th:text="${tutor.user.fullName}">Name</div>
                                        <small th:text="${tutor.user.email}" class="text-muted">Email</small>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <small th:text="${tutor.subjects.length() > 40 ? tutor.subjects.substring(0,40) + '...' : tutor.subjects}">
                                    Subjects
                                </small>
                            </td>
                            <td th:text="${tutor.location}">Location</td>
                            <td th:text="${tutor.hourlyRate}">0</td>
                            <td>
                                <i class="bi bi-star-fill text-warning small"></i>
                                <span th:text="${tutor.averageRating}">0.0</span>
                                <small th:text="'(' + ${tutor.totalReviews} + ')'">
                                    (0)
                                </small>
                            </td>
                            <td>
                                <span th:if="${tutor.approved}" class="badge bg-success">Approved</span>
                                <span th:if="${!tutor.approved}" class="badge bg-warning text-dark">Pending</span>
                                <br>
                                <small>
                                    <span th:if="${tutor.acceptingBookings}" class="text-success">Online</span>
                                    <span th:if="${!tutor.acceptingBookings}" class="text-muted">Offline</span>
                                </small>
                            </td>
                            <td th:text="${#lists.size(tutor.bookings)}">0</td>
                            <td>
                                <div class="d-flex gap-1 flex-wrap">
                                    <!-- Approve button (if not approved) -->
                                    <form th:if="${!tutor.approved}"
                                          th:action="@{/admin/tutors/{id}/approve(id=${tutor.id})}"
                                          method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-success">
                                            <i class="bi bi-check-lg"></i> Approve
                                        </button>
                                    </form>
                                    <!-- Revoke button (if approved) -->
                                    <form th:if="${tutor.approved}"
                                          th:action="@{/admin/tutors/{id}/revoke(id=${tutor.id})}"
                                          method="post"
                                          onsubmit="return confirm('Revoke this tutor\'s approval?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-warning">
                                            <i class="bi bi-x-lg"></i> Revoke
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(tutors)}" class="empty-state">
                <i class="bi bi-person-badge"></i>
                <h5>No tutors registered yet</h5>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
